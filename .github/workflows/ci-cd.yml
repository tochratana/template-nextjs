name: "CI/CD Pipeline"

on:
  push:
    branches: [main, develop]
    tags:
      - "v*.*.*"           # triggers on version tags like v1.0.0, v2.3.1
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/template-nextjs
  HELM_REPO: tochratana/gitops-repo.git
  GITOPS_BRANCH: main
  ARGOCD_APP_NAME: helm-argocd
  ARGOCD_APP_PATH: next-ts-chart
  APP_NAMESPACE: default
  TAG: ""
  SONAR_SKIP: ""

jobs:
  build-scan-push:
    name: Build, Scan & Push Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # If triggered by a release tag (v*.*.*), use the tag as the image tag.
      # Otherwise (branch push / PR), fall back to the short commit SHA.
      - name: Set image TAG
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "TAG=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          else
            echo "TAG=${GITHUB_SHA::8}" >> $GITHUB_ENV
          fi

      - name: Build Docker image
        run: docker build -t ${{ env.DOCKER_IMAGE }}:${{ env.TAG }} .

      # Only push when a release tag is pushed  (not on branch commits or PRs)
      - name: Log in to Docker Hub
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag image as latest
        if: startsWith(github.ref, 'refs/tags/v')
        run: docker tag ${{ env.DOCKER_IMAGE }}:${{ env.TAG }} ${{ env.DOCKER_IMAGE }}:latest

      - name: Push image (version tag + latest)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          docker push ${{ env.DOCKER_IMAGE }}:${{ env.TAG }}
          docker push ${{ env.DOCKER_IMAGE }}:latest

      - name: Logout from Dockerhub
        if: always()
        run: docker logout

  update-gitops:
    name: Update GitOps Repository
    runs-on: ubuntu-latest
    needs: build-scan-push
    # Only run when a release tag is pushed
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Install yq command
        run: |
          wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Set image TAG
        run: echo "TAG=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Clone argocd repo
        run: git clone https://github.com/${{ env.HELM_REPO }} helm_repo

      - name: Update Helm Chart
        run: |
          cd helm_repo
          echo "Update repository username/imagename"
          yq -i ".image.repository=\"${{ env.DOCKER_IMAGE }}\"" next-ts-chart/values.yaml

          echo "Update image tag to release version"
          yq -i ".image.tag=\"${{ env.TAG }}\"" next-ts-chart/values.yaml

          git config --global user.email "tochratana@users.github.com"
          git config --global user.name "iloveyou"

          git add .
          git commit -m "Release ${{ env.TAG }}: update helm to use image ${{ env.TAG }}"
          git push https://${{ secrets.GIT_TOKEN }}@github.com/${{ env.HELM_REPO }}

      - name: Clean up
        if: always()
        run: rm -rf helm_repo

  argocd-deploy:
    name: ArgoCD Create & Sync
    runs-on: ubuntu-latest
    needs: update-gitops
    # Only run when a release tag is pushed
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Install ArgoCD CLI
        run: |
          VERSION=$(curl -L -s https://raw.githubusercontent.com/argoproj/argo-cd/stable/VERSION)
          curl -sSL -o /usr/local/bin/argocd \
            "https://github.com/argoproj/argo-cd/releases/download/v${VERSION}/argocd-linux-amd64"
          chmod +x /usr/local/bin/argocd
          argocd version --client

      - name: Set image TAG
        run: echo "TAG=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Login to ArgoCD
        run: |
          argocd login ${{ secrets.ARGOCD_SERVER }} \
            --username ${{ secrets.ARGOCD_USERNAME }} \
            --password ${{ secrets.ARGOCD_PASSWORD }} \
            --insecure

      - name: Create / Update ArgoCD Application
        run: |
          argocd app create ${{ env.ARGOCD_APP_NAME }} \
            --repo https://github.com/${{ env.HELM_REPO }} \
            --revision ${{ env.GITOPS_BRANCH }} \
            --path ${{ env.ARGOCD_APP_PATH }} \
            --dest-server https://kubernetes.default.svc \
            --dest-namespace ${{ env.APP_NAMESPACE }} \
            --sync-policy automated \
            --auto-prune \
            --self-heal \
            --upsert \
            --helm-set image.repository=${{ env.DOCKER_IMAGE }} \
            --helm-set image.tag=${{ env.TAG }}

      - name: Refresh ArgoCD Application
        run: |
          argocd app get ${{ env.ARGOCD_APP_NAME }} --refresh

      - name: Wait for healthy rollout
        run: |
          argocd app wait ${{ env.ARGOCD_APP_NAME }} \
            --health \
            --timeout 300

      - name: Print final application status
        if: always()
        run: |
          argocd app get ${{ env.ARGOCD_APP_NAME }}

  selenium-test:
    name: Run Selenium Tests
    runs-on: ubuntu-latest
    needs: argocd-deploy
    # Only run when a release tag is pushed
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run Selenium test
        run: node tests/selenium-test.js