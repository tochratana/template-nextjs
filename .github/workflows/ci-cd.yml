name: "CI/CD Pipeline"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

env:
  DOCKER_IMAGE_NAME: template-nextjs
  # Adjusting to standard DOCKER_USERNAME across all usages for consistency
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/template-nextjs
  HELM_REPO: tochratana/gitops-repo.git
  GITOPS_BRANCH: main
  ARGOCD_APP_NAME: helm-argocd
  ARGOCD_APP_PATH: next-ts-chart
  APP_NAMESPACE: default
  ARGOCD_NAMESPACE: argocd
  TAG: ""
  SONAR_SKIP: ""

