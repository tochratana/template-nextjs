name: "4 - Push Image"

on:
  workflow_run:
    workflows: ["3 - Image Scan"]
    types: [completed]
    branches: [master]   # Push to Docker Hub only from main branch

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/reactjs-template
  IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}

jobs:
  push-image:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # Download the pre-built image tar (avoids rebuilding)
      - name: Download image artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: 2-build-image.yml
          commit: ${{ github.event.workflow_run.head_sha }}
          name: docker-image-${{ env.IMAGE_TAG }}
          path: .

      - name: Load Docker image from tar
        run: docker load -i image-${{ env.IMAGE_TAG }}.tar

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag image as latest
        run: |
          docker tag \
            ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }} \
            ${{ env.DOCKER_IMAGE }}:latest

      - name: Push image (sha tag + latest)
        run: |
          docker push ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.DOCKER_IMAGE }}:latest

      - name: Print image digest
        run: |
          docker inspect \
            --format='{{index .RepoDigests 0}}' \
            ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }}