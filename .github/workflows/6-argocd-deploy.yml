name: "6 - ArgoCD Deploy"

on:
  workflow_run:
    workflows: ["5 - Update GitOps"]
    types: [completed]
    branches: [main]

env:
  IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/reactjs-template
  GITOPS_REPO: https://github.com/tochratana/helm-argocd.git
  GITOPS_BRANCH: main
  ARGOCD_APP_NAME: helm-argocd
  ARGOCD_APP_PATH: .
  APP_NAMESPACE: default
  ARGOCD_NAMESPACE: argocd

jobs:
  argocd-deploy:
    name: ArgoCD Create & Sync
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd
          argocd version --client

      - name: Login to ArgoCD
        run: |
          argocd login ${{ secrets.ARGOCD_SERVER }} \
            --username ${{ secrets.ARGOCD_USERNAME }} \
            --password ${{ secrets.ARGOCD_PASSWORD }} \
            --insecure

      # ── Auto-create or update ArgoCD Application ───
      # --upsert makes this idempotent: creates if not exists, updates if exists
      - name: Create / Update ArgoCD Application
        run: |
          argocd app create ${{ env.ARGOCD_APP_NAME }} \
            --repo ${{ env.GITOPS_REPO }} \
            --revision ${{ env.GITOPS_BRANCH }} \
            --path ${{ env.ARGOCD_APP_PATH }} \
            --dest-server https://kubernetes.default.svc \
            --dest-namespace ${{ env.APP_NAMESPACE }} \
            --sync-policy automated \
            --auto-prune \
            --self-heal \
            --upsert \
            --helm-set image.repository=${{ env.DOCKER_IMAGE }} \
            --helm-set image.tag=${{ env.IMAGE_TAG }}

      # ── Force sync to pick up the gitops commit immediately ───
      - name: Sync ArgoCD Application
        run: |
          argocd app sync ${{ env.ARGOCD_APP_NAME }} \
            --force \
            --prune

      # ── Wait until the app is healthy in the cluster ───
      - name: Wait for healthy rollout
        run: |
          argocd app wait ${{ env.ARGOCD_APP_NAME }} \
            --health \
            --timeout 300

      - name: Print final application status
        if: always()
        run: |
          argocd app get ${{ env.ARGOCD_APP_NAME }}
